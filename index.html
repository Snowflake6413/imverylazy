<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Redirecting...</title>
  <meta http-equiv="refresh" content="3; url=https://alexanderisashy.one/">
  <style>
    /* Only rule kept: a static image can't spin without it. */
    @keyframes spin { to { transform: rotate(360deg); } }
    img { animation: spin 2s linear infinite; }
  </style>
</head>
<body>
  <img src="https://cdn.hackclub.com/019f7879-0f0b-7d89-ad9f-1ed3e6188fe5/alien%202.jpg" alt="Spinning alien" width="200">
  <script>
    setTimeout(function () {
      window.location.href = "https://alexanderisashy.one/";
    }, 3000);
  </script>
</body>
</html>
