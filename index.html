<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting...</title>
  <meta http-equiv="refresh" content="3; url=https://alexanderisashy.one/">
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #0b0b12;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      color: #e6e6f0;
      overflow: hidden;
    }

    .alien {
      width: 220px;
      height: 220px;
      object-fit: contain;
      animation: spin 2s linear infinite;
      filter: drop-shadow(0 0 25px rgba(120, 200, 120, 0.5));
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    p {
      margin-top: 2rem;
      font-size: 1.1rem;
      letter-spacing: 0.02em;
      opacity: 0.85;
    }

    a {
      color: #8fd68f;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <img
    class="alien"
    src="https://cdn.hackclub.com/019f7879-0f0b-7d89-ad9f-1ed3e6188fe5/alien%202.jpg"
    alt="Spinning alien"
  >
  <p>Redirecting you to <a href="https://alexanderisashy.one/">alexanderisashy.one</a>&hellip;</p>

  <script>
    // Redirect right away; the meta refresh above is a no-JS fallback.
    setTimeout(function () {
      window.location.href = "https://alexanderisashy.one/";
    }, 3000);
  </script>
</body>
</html>
